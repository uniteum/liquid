<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="520"
  height="360"
  viewBox="0 0 520 360"
>

  <style>
    /* ---- BAR COLORS ---- */
    .blue  { fill: #4da3ff; }
    .green { fill: #6ad58b; }

    /* ---- SEMANTIC VARIABLES ---- */
    .solid    { --prefix: "Solid"; }
    .pooled   { --prefix: "Pooled"; }
    .unpooled { --prefix: "Unpooled"; }

    .spoke { --suffix: "Spoke"; }
    .hub   { --suffix: "Hub"; }

    .a-1100 { --amount: "1100"; }
    .a-400  { --amount: "400"; }

    /* ---- TEXT STYLES ---- */
    .label {
      font-size: 12px;
      fill: #666;
      text-anchor: middle;
      font-family: system-ui, Arial, sans-serif;
    }

    .amount {
      font-size: 16px;
      font-weight: 700;
      fill: #111;
      text-anchor: middle;
      font-family: system-ui, Arial, sans-serif;
    }
  </style>

  <defs>
    <!-- bar geometry (width defined once) -->
    <symbol id="bar-shape" overflow="visible">
      <rect x="0" y="0" width="120" height="1" />
    </symbol>

    <!-- SINGLE legend definition -->
    <symbol id="legend">
      <text class="label" x="60" y="24">
        <tspan class="prefix"></tspan>
        <tspan> </tspan>
        <tspan class="suffix"></tspan>
      </text>
      <text class="amount" x="60" y="48"></text>
    </symbol>
  </defs>

  <!-- BAR 1 -->
  <g class="pooled spoke a-1100 blue" transform="translate(40 300)">
    <g transform="scale(1,-1)">
      <use href="#bar-shape" transform="scale(1,180)" />
    </g>
    <use href="#legend" />
  </g>

  <!-- BAR 2 -->
  <g class="unpooled spoke a-1100 blue" transform="translate(200 300)">
    <g transform="scale(1,-1)">
      <use href="#bar-shape" transform="scale(1,95)" />
    </g>
    <use href="#legend" />
  </g>

  <!-- BAR 3 -->
  <g class="pooled hub a-400 green" transform="translate(360 300)">
    <g transform="scale(1,-1)">
      <use href="#bar-shape" transform="scale(1,40)" />
    </g>
    <use href="#legend" />
  </g>

  <!-- VARIABLE BINDING -->
  <style>
    .prefix  { fill: #666; }
    .suffix  { fill: #666; }

    g > use + use .prefix  { content: var(--prefix); }
    g > use + use .suffix  { content: var(--suffix); }
    g > use + use + .amount { content: var(--amount); }
  </style>

</svg>

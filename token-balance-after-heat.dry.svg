<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <!-- DRY refactor:
       - Shared styles moved to CSS classes (no repeated font/paint attributes)
       - Shared bar stroke moved to .bar class
       - Per-bar markup now only specifies position, height, fill, and label/value text
  -->
  <defs>
    <pattern id="stripe-green" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#22c55e"/>
      <rect x="4" width="4" height="8" fill="#16a34a"/>
    </pattern>
    <pattern id="stripe-blue" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#3b82f6"/>
      <rect x="4" width="4" height="8" fill="#2563eb"/>
    </pattern>
  </defs>

  <style>
    .title    { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #666; text-anchor: middle; }
    .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    .axis     { stroke: #999; stroke-width: 2; }

    .bar      { stroke: #333; stroke-width: 2; }
    .label    { font-family: Arial, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
    .amount   { font-family: Arial, sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
  </style>

  <text x="450" y="30" class="title">After Heating 100 Spoke Tokens</text>
  <text x="450" y="50" class="subtitle">Solid: 750 → 650 | Liquid: 1000 → 1100 (both pooled and unpooled)</text>

  <line x1="40" y1="320" x2="860" y2="320" class="axis"/>

  <!-- 1. Solid Spoke: 650 -->
  <g transform="translate(60, 190)">
    <rect class="bar" width="120" height="130" rx="8" ry="8" fill="url(#stripe-green)"/>
    <text class="label"  x="60" y="150">Solid Spoke</text>
    <text class="amount" x="60" y="170">650</text>
  </g>

  <!-- 2. Unpooled Liquid Spoke: 1100 -->
  <g transform="translate(200, 100)">
    <rect class="bar" width="120" height="220" rx="8" ry="8" fill="#22c55e"/>
    <text class="label"  x="60" y="240">Unpooled</text>
    <text class="label"  x="60" y="255">Liquid Spoke</text>
    <text class="amount" x="60" y="275">1100</text>
  </g>

  <!-- 3. Pooled Liquid Spoke: 1100 -->
  <g transform="translate(340, 100)">
    <rect class="bar" width="120" height="220" rx="8" ry="8" fill="#22c55e"/>
    <text class="label"  x="60" y="240">Pooled</text>
    <text class="label"  x="60" y="255">Liquid Spoke</text>
    <text class="amount" x="60" y="275">1100</text>
  </g>

  <!-- 4. Pooled Liquid Hub: 1000 -->
  <g transform="translate(480, 120)">
    <rect class="bar" width="120" height="200" rx="8" ry="8" fill="#3b82f6"/>
    <text class="label"  x="60" y="220">Pooled</text>
    <text class="label"  x="60" y="235">Liquid Hub</text>
    <text class="amount" x="60" y="255">1000</text>
  </g>

  <!-- 5. Unpooled Liquid Hub: 1000 -->
  <g transform="translate(620, 120)">
    <rect class="bar" width="120" height="200" rx="8" ry="8" fill="#3b82f6"/>
    <text class="label"  x="60" y="220">Unpooled</text>
    <text class="label"  x="60" y="235">Liquid Hub</text>
    <text class="amount" x="60" y="255">1000</text>
  </g>

  <!-- 6. Solid Hub: 1250 -->
  <g transform="translate(760, 70)">
    <rect class="bar" width="120" height="250" rx="8" ry="8" fill="url(#stripe-blue)"/>
    <text class="label"  x="60" y="270">Solid Hub</text>
    <text class="amount" x="60" y="290">1250</text>
  </g>
</svg>
